<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Adventures Of Jerib</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@400;700;900&display=swap');

  :root {
    --neon-blue: #00d4ff;
    --neon-purple: #a855f7;
    --neon-pink: #f472b6;
    --neon-green: #22c55e;
    --dark-bg: #060b18;
    --panel-bg: rgba(10,20,40,0.92);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark-bg);
    color: #e2e8f0;
    font-family: 'Exo 2', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Animated starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 50%, rgba(0,212,255,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 85% 70%, rgba(168,85,247,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .back-btn {
    position: absolute;
    top: 16px;
    left: 16px;
    padding: 8px 16px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(0,212,255,.3);
    border-radius: 8px;
    color: #94a3b8;
    text-decoration: none;
    font-weight: 700;
    font-size: 12px;
    font-family: 'Exo 2', sans-serif;
    transition: all .2s;
    z-index: 1000;
  }
  .back-btn:hover { background: rgba(0,212,255,.1); color: var(--neon-blue); }

  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.6rem;
    margin: 16px 0 12px;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    letter-spacing: 2px;
    filter: drop-shadow(0 0 20px rgba(168,85,247,0.4));
  }

  .hud {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hud-item {
    background: var(--panel-bg);
    border: 1px solid rgba(0,212,255,.25);
    border-radius: 10px;
    padding: 8px 18px;
    text-align: center;
    min-width: 90px;
    box-shadow: 0 0 15px rgba(0,212,255,.08), inset 0 1px 0 rgba(255,255,255,.05);
  }

  .hud-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #475569;
    margin-bottom: 3px;
    font-family: 'Press Start 2P', monospace;
  }

  .hud-value {
    font-size: 18px;
    font-weight: 900;
    color: var(--neon-blue);
    font-family: 'Press Start 2P', monospace;
    text-shadow: 0 0 10px rgba(0,212,255,0.5);
  }

  #gameCanvas {
    border: 2px solid rgba(0,212,255,.3);
    border-radius: 10px;
    background: #000;
    box-shadow: 0 0 50px rgba(0,212,255,.15), 0 0 100px rgba(168,85,247,.1);
    display: block;
    width: 800px;
    height: 480px;
  }

  .controls {
    margin-top: 12px;
    text-align: center;
    color: #475569;
    font-size: 12px;
    font-family: 'Press Start 2P', monospace;
  }

  .controls-grid {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .key {
    background: rgba(0,212,255,.08);
    border: 1px solid rgba(0,212,255,.25);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 10px;
    font-family: 'Press Start 2P', monospace;
    color: #64748b;
  }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    backdrop-filter: blur(12px);
    z-index: 2000;
    align-items: center;
    justify-content: center;
  }

  .modal.open { display: flex; }

  .modal-box {
    background: rgba(6,11,24,0.97);
    border: 1px solid rgba(0,212,255,.3);
    border-radius: 20px;
    padding: 30px;
    max-width: 720px;
    width: 94%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 0 60px rgba(0,212,255,.1), 0 0 120px rgba(168,85,247,.08);
  }

  .modal-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 24px;
    text-align: center;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .world-section { margin-bottom: 28px; }

  .world-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    font-weight: 800;
    margin-bottom: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    letter-spacing: 1px;
  }

  .world-earth { background: linear-gradient(135deg, #065f46, #10b981); }
  .world-hell  { background: linear-gradient(135deg, #7f1d1d, #ef4444); }
  .world-sky   { background: linear-gradient(135deg, #1e3a5f, #3b82f6); }

  .levels-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }

  .level-btn {
    aspect-ratio: 1;
    border: 1px solid rgba(0,212,255,.2);
    border-radius: 10px;
    background: rgba(255,255,255,.04);
    color: #94a3b8;
    font-weight: 800;
    font-size: 14px;
    font-family: 'Press Start 2P', monospace;
    cursor: pointer;
    transition: all .15s;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }

  .level-btn:hover:not(.locked) {
    background: rgba(0,212,255,.1);
    border-color: rgba(0,212,255,.5);
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,212,255,.2);
  }

  .level-btn.completed {
    background: rgba(34,197,94,.12);
    border-color: rgba(34,197,94,.4);
    color: #86efac;
  }

  .level-btn.locked {
    opacity: 0.25;
    cursor: not-allowed;
  }

  .level-btn .stars {
    font-size: 9px;
    line-height: 1;
  }

  .btn {
    background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(168,85,247,.15));
    color: var(--neon-blue);
    border: 1px solid rgba(0,212,255,.4);
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Press Start 2P', monospace;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn:hover {
    background: linear-gradient(135deg, rgba(0,212,255,.25), rgba(168,85,247,.25));
    box-shadow: 0 0 20px rgba(0,212,255,.3);
    transform: translateY(-2px);
  }

  /* Canvas overlay (pause/death/complete) */
  #overlayCanvas {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    border-radius: 10px;
  }

  .canvas-wrapper {
    position: relative;
    display: inline-block;
  }

  /* Notifications */
  :fullscreen body, :-webkit-full-screen body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  :fullscreen #gameCanvas, :-webkit-full-screen #gameCanvas {
    border-radius: 0 !important;
  }
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: rgba(6,11,24,0.95);
    border: 1px solid var(--neon-green);
    border-radius: 10px;
    padding: 12px 24px;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--neon-green);
    z-index: 9999;
    transition: transform .4s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 30px rgba(34,197,94,.3);
    white-space: nowrap;
  }

  #notification.show { transform: translateX(-50%) translateY(0); }
</style>

    <div class="world-section">
      <div class="world-title world-sky">☁️ WORLD 3: SKY</div>

    <button class="btn" style="width: 100%; margin-top: 16px;" onclick="closeLevelSelect()">CLOSE</button>
